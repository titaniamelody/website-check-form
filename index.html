<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Check Request</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
  }

  h1 {
    font-size: 22px;
    color: #1a1a1a;
    margin-bottom: 6px;
  }

  p.subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  input[type="text"],
  input[type="email"],
  input[type="url"],
  input[type="tel"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: #5b47e0;
  }

  small.hint {
    display: block;
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  button {
    width: 100%;
    margin-top: 26px;
    padding: 12px;
    background: #5b47e0;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background: #4a38c9;
  }

  button:disabled {
    background: #a8a0e8;
    cursor: not-allowed;
  }

  #statusMsg {
    margin-top: 16px;
    font-size: 14px;
    text-align: center;
    display: none;
  }

  #statusMsg.success {
    color: #1a7f37;
    display: block;
  }

  #statusMsg.error {
    color: #d1242f;
    display: block;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Website Check Request</h1>
  <p class="subtitle">Fill this in and we'll check your site for broken links, then email and WhatsApp you the results.</p>

  <form id="checkForm">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required placeholder="Jane Doe">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="jane@example.com">

    <label for="website">Website URL</label>
    <input type="url" id="website" name="website" required placeholder="https://example.com">

    <label for="phone">WhatsApp Number</label>
    <input type="tel" id="phone" name="phone" required placeholder="923001234567">
    <small class="hint">Include country code, no + or spaces (e.g. 923001234567)</small>

    <button type="submit" id="submitBtn">Submit</button>
    <div id="statusMsg"></div>
  </form>
</div>

<script>
  // Paste your Zapier "Catch Hook" webhook URL here after creating the trigger step
  const WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/28310299/44mwekq/";

  const form = document.getElementById("checkForm");
  const btn = document.getElementById("submitBtn");
  const statusMsg = document.getElementById("statusMsg");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const payload = {
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      website: document.getElementById("website").value.trim(),
      phone: document.getElementById("phone").value.trim()
    };

    btn.disabled = true;
    btn.textContent = "Submitting...";
    statusMsg.className = "";
    statusMsg.textContent = "";

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });

      if (!response.ok) throw new Error("Request failed");

      statusMsg.className = "success";
      statusMsg.textContent = "Submitted! Check your email and WhatsApp shortly.";
      form.reset();
    } catch (err) {
      statusMsg.className = "error";
      statusMsg.textContent = "Something went wrong. Please try again.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit";
    }
  });
</script>

</body>
</html>
